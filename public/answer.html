<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarathi · Your Itinerary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page-transition"></div>
    <div class="floating-orb orb-primary"></div>
    <div class="floating-orb orb-secondary"></div>

    <div class="page-shell">
      <nav class="nav-bar">
        <div class="nav-left">
          <a class="nav-login" href="/" title="Reconfigure">← Back</a>
          <a class="nav-brand" href="/">SARATHI</a>
        </div>
        <div class="nav-right">
          <button id="sessionBtn" class="nav-login secondary">Login</button>
          <button id="logoutBtn" class="nav-login hidden">Logout</button>
        </div>
      </nav>

      <section class="answer-layout">
        <article class="glass-card itinerary-card" id="itineraryCard">
          <p class="tagline">Itinerary crafted</p>
          <div class="answer-subhead">Meticulously generated by Gemini 3 Pro via Sarathi</div>
          <h2>Your bespoke journey</h2>
          <div id="itineraryOutput" class="itinerary-content">
            <p class="muted">We are ready to conjure something lovely. Submit preferences once more.</p>
          </div>
          <div class="actions-row">
            <button id="exportBtn" class="btn secondary-btn">Export itinerary as PDF</button>
          </div>
        </article>

        <aside class="glass-card control-panel">
          <h3 class="answer-subhead">Refine the inputs</h3>
          <form id="answerForm">
            <label>
              Destination / Region
              <input type="text" name="destination" required />
            </label>
            <label>
              Dates / Timeframe
              <input type="text" name="dates" required />
            </label>
            <label>
              Budget
              <input type="text" name="budget" />
            </label>
            <label>
              Travelers
              <input type="number" min="1" name="passengers" />
            </label>
            <label>
              Interests
              <input type="text" name="interests" />
            </label>
            <label>
              Preferred Weather
              <select name="weather">
                <option value="Warm and sunny">Warm & sunny</option>
                <option value="Mild spring">Mild spring</option>
                <option value="Crisp autumn">Crisp autumn</option>
                <option value="Cozy winter">Cozy winter</option>
              </select>
            </label>
            <label>
              Travel Pace
              <select name="pace">
                <option value="Leisurely">Leisurely</option>
                <option value="Balanced" selected>Balanced</option>
                <option value="Fast-paced">Fast paced</option>
              </select>
            </label>
            <label>
              Specific notes / must-dos
              <textarea name="specialNotes" placeholder="Anything Sarathi must honor."></textarea>
            </label>
            <div class="actions-row">
              <button class="btn" type="submit">Generate itinerary</button>
              <button class="btn secondary-btn" type="button" id="regenerateBtn" disabled>
                Regenerate with Gemini
              </button>
              <p id="answerStatus" class="status-badge"></p>
              <div id="answerAlert" class="alert alert-error hidden"></div>
            </div>
          </form>
        </aside>
      </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-YcsIP7q1QnR6GgZ8+gjs53RNPFH+hQVFGkJzd8I1QKAmhpN6wX6Z1GDZsBoBPXaGNsq4CPGK/cHBXHi5Zk0Ztg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="/js/answer.js" type="module"></script>
  </body>
</html>
