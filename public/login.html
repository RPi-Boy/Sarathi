<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarathi · Login</title>
  <meta name="description" content="Log in to your Sarathi account to unlock regenerative travel itineraries." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <div class="page-transition"></div>

  <!-- Floating Pill Navbar -->
  <nav class="floating-nav" id="mainNav">
    <a class="nav-brand-group" href="/">
      <img src="/sarathi_logo_transparent.png" alt="Sarathi logo" />
      <span class="nav-brand-text">Sarathi</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/">Launch AI Planner</a>
      <a class="nav-link" href="#" onclick="alert('My Plans — coming soon!'); return false;">My Plans</a>
      <a class="nav-link" href="#" onclick="alert('Journal — coming soon!'); return false;">Journal</a>
    </div>
    <div class="nav-spacer"></div>
    <a class="nav-icon-btn" href="/signup" title="Create account">
      <span class="material-icons">person_add</span>
    </a>
  </nav>

  <div class="page-shell">
    <section class="glass-card auth-card">
      <h1 class="auth-title">Log in</h1>
      <p class="answer-subhead">Unlock regenerative itineraries, synced across your devices.</p>
      <form id="loginForm">
        <label>
          Email address
          <input type="email" name="email" placeholder="you@email.com" required />
        </label>
        <label>
          Password
          <input type="password" name="password" placeholder="••••••••" required />
        </label>
        <button class="btn" type="submit">Enter Sarathi</button>
        <p id="loginStatus" class="status-badge"></p>
      </form>
      <p class="auth-switch">
        New traveler? <a href="/signup">Create an account</a>
      </p>
    </section>
  </div>

  <script src="/js/login.js" type="module"></script>
</body>

</html>
