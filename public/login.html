<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarathi · Login</title>
  <meta name="description" content="Log in to your Sarathi account to unlock regenerative travel itineraries." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <div class="page-transition"></div>

  <!-- Floating Pill Navbar -->
  <nav class="floating-nav" id="mainNav">
    <a class="nav-brand-group" href="/">
      <img src="/sarathi_logo_transparent.png" alt="Sarathi logo" />
      <span class="nav-brand-text">Sarathi</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/" data-i18n="nav.planner">Launch AI Planner</a>
      <a class="nav-link" href="/plans" data-i18n="nav.plans">My Plans</a>
      <a class="nav-link" href="/journal" data-i18n="nav.journal">Journal</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="lang-toggle" id="langToggleBtn" title="Switch language">
      <span class="lang-current">EN</span><span class="lang-divider">|</span><span class="lang-alt">हि</span>
    </button>
    <a class="nav-icon-btn" href="/signup" data-i18n-title="nav.signup">
      <span class="material-icons">person_add</span>
    </a>
  </nav>

  <div class="page-shell">
    <section class="glass-card auth-card">
      <h1 class="auth-title" data-i18n="login.title">Log in</h1>
      <p class="answer-subhead" data-i18n="login.subtitle">Unlock regenerative itineraries, synced across your devices.
      </p>
      <form id="loginForm">
        <label>
          <span data-i18n="login.email">Email address</span>
          <input type="email" name="email" placeholder="you@email.com" required />
        </label>
        <label>
          <span data-i18n="login.password">Password</span>
          <input type="password" name="password" placeholder="••••••••" required />
        </label>
        <button class="btn" type="submit" data-i18n="login.submit">Enter Sarathi</button>
        <p id="loginStatus" class="status-badge"></p>
      </form>
      <p class="auth-switch">
        <span data-i18n="login.switchText">New traveler?</span> <a href="/signup" data-i18n="login.switchLink">Create an
          account</a>
      </p>
    </section>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/login.js" type="module"></script>
</body>

</html>
